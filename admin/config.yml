# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: konradjam/personal-webpage
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/1bbb1a6e-20d5-4443-b74b-73f2efb09416/pkce
  auth_token_endpoint: /sites/1bbb1a6e-20d5-4443-b74b-73f2efb09416/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://famous-meerkat-e50669.netlify.app

media_folder: "assets/images" # Where the uploaded files will be saved in the repo
public_folder: "/assets/images" # The path used in the generated content

collections:
  - name: "projects"
    label: "Portfolio Projects"
    folder: "content/projects" # Folder where markdown files will be saved
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Project Title"
        name: "title"
        widget: "string"

      - label: "External URL"
        name: "project_url"
        widget: "string"
        hint: "Remember to include https://"

      - label: "Filter Categories"
        name: "categories"
        widget: "select"
        multiple: true
        options: ["ai", "automatisation", "dtp", "graphic", "web", "iot"]
        hint: "Select one or more categories for the filtering system"

      - label: "Technologies Used"
        name: "technologies"
        widget: "list"
        summary: '{{fields.tech_name}}'
        field: {label: "Technology Name", name: "tech_name", widget: "string"}
        hint: "Add technologies one by one (e.g., n8n, API, HTML)"

      - label: "Problem Description"
        name: "problem"
        widget: "text"
        
      - label: "Solution"
        name: "solution"
        widget: "text"

      - label: "Impact / Result"
        name: "impact"
        widget: "text"

