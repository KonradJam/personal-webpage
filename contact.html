<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Kontakt | Grafik, Frontend Developer i Ekspert Automatyzacji</title>
    <meta name="description" content="Napisz maila i opowiedz, czego potrzebujesz: strony www, grafiki czy automatyzacji. Zdalnie i stacjonarnie (Kalisz).">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://konradjam.com/contact.html">

    <meta property="og:title" content="Kontakt | Grafik, Frontend Developer i Automatyzacja">
    <meta property="og:description" content="Napisz i sprawdź, jak automatyzacja, nowoczesny frontend i precyzyjna grafika mogą rozwinąć Twój biznes.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://konradjam.com/contact.html">
    <meta property="og:image" content="https://konradjam.com/images/og-contact.png">
    <meta property="og:locale" content="pl_PL">
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="lang-switcher">
        <a href="contact.html" class="lang-switcher__link lang-switcher__link--active" aria-label="Wersja Polska">PL</a> |
        <a href="en/contact.html" class="lang-switcher__link" aria-label="English Version">EN</a>
    </div>
    <div class="container">

      <nav class="nav" aria-label="Główna nawigacja">
        <a href="index.html" class="nav__link">O mnie</a>
        <a href="projects.html" class="nav__link">Projekty</a>
        <a href="contact.html" class="nav__link nav__link--active" aria-current="page">Kontakt</a>
      </nav>

      <header class="header">
        <h1 class="header__title">Kontakt</h1>
      </header>

      <hr class="divider" />

      <main class="main">
        <section class="contact" aria-labelledby="contact-heading">

          <div class="manifesto">
            <p class="manifesto__paragraph">
              Porozmawiajmy o automatyzacji Twoich procesów lub nowym projekcie
              webowym. Odpowiadam zazwyczaj w ciągu&nbsp;24&nbsp;godzin.
            </p>
          </div>

          <a id="contact-email-link" class="contact__email" title="Kliknij, aby wysłać e-mail">
  Pokaż adres e-mail
          </a>

          <form
            class="form"
            method="POST"
            data-netlify="true"
            name="contact"
            novalidate
          >
            <div class="form__group">
              <label for="contact-name" class="form__label">Imię:</label>
              <input
                type="text"
                id="contact-name"
                name="name"
                class="form__control"
                autocomplete="given-name"
                required
              />
            </div>

            <div class="form__group">
              <label for="contact-email" class="form__label">E-mail:</label>
              <input
                type="email"
                id="contact-email"
                name="email"
                class="form__control"
                autocomplete="email"
                required
              />
            </div>

            <div class="form__group">
              <label for="contact-message" class="form__label">Treść:</label>
              <textarea
                id="contact-message"
                name="message"
                class="form__control form__control--textarea"
                rows="8"
                required
              ></textarea>
            </div>

            <div class="form__actions">
              <button type="submit" class="form__btn">
                Wyślij wiadomość
              </button>
            </div>
          </form>

        </section>
      </main>

      <footer class="footer">
        <div class="footer__links">
          <a
            href="https://github.com/konradjam"
            class="footer__link"
            target="_blank"
            rel="noopener noreferrer"
          >GitHub</a>
          <a
            href="https://linkedin.com/in/konradjam"
            class="footer__link"
            target="_blank"
            rel="noopener noreferrer"
          >LinkedIn</a>
        </div>
        <p class="footer__copyrights">&copy; 2026 Konrad Jam</p>
      </footer>

    </div>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/seo-schema.js"></script>
  </body>
</html>
